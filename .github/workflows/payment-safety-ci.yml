name: Payment Safety (test branch)

on:
  workflow_dispatch:

concurrency:
  group: payment-safety-ci
  cancel-in-progress: false

jobs:
  payment-safety:
    runs-on: ubuntu-latest
    environment: test
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      PROD_REF: oeunlirtgvqwftcqludy

    steps:
      - uses: actions/checkout@v4

      - name: Install psql and uuidgen
        run: sudo apt-get update && sudo apt-get install -y postgresql-client uuid-runtime

      - name: Guard secret, production block, and test marker
        run: |
          set -euo pipefail

          : "${TEST_DATABASE_URL:?TEST_DATABASE_URL secret is not set}"

          case "$TEST_DATABASE_URL" in
            *"$PROD_REF"*)
              echo "REFUSING: URL points at the production project."
              exit 1
              ;;
          esac

          # Positive DB-level marker in the PRIVATE schema (not API-exposed).
          # ON_ERROR_STOP=1 + set -e mean a real psql/connection error fails the
          # step and prints the actual error — we do NOT swallow it with "|| echo".
          MARK="$(psql "$TEST_DATABASE_URL" -X -t -A -v ON_ERROR_STOP=1 \
            -c "select marker from private._ci_test_marker where marker = 'confidel-ci';")"
          MARK="$(printf '%s' "$MARK" | tr -d '[:space:]')"

          if [ "$MARK" != "confidel-ci" ]; then
            echo "REFUSING: private._ci_test_marker did not return 'confidel-ci' (got: '$MARK')."
            exit 1
          fi

          echo "Guard passed: non-production database marker confirmed."

      - name: Apply baseline schema (idempotent prerequisites)
        run: |
          set -euo pipefail
          PSQL=(psql "$TEST_DATABASE_URL" -X -q -v ON_ERROR_STOP=1)

          # The 2026-06-29 fixes ALTER tables created by these earlier migrations
          # (job_financial_summaries, invoice_line_items, job_completion_*). The
          # test branch only carries the base tables, so apply these first. Both
          # files are idempotent (create ... if not exists / create or replace).
          "${PSQL[@]}" -f db/fixes/2026-06-23_structured_completion.sql
          "${PSQL[@]}" -f db/fixes/2026-06-23_pricing_invoicing.sql

      - name: Apply both migrations twice
        run: |
          set -euo pipefail
          PSQL=(psql "$TEST_DATABASE_URL" -X -q -v ON_ERROR_STOP=1)

          for pass in 1 2; do
            echo "== migration pass $pass =="
            "${PSQL[@]}" -f db/fixes/2026-06-29_invoice_tax_numeric.sql
            "${PSQL[@]}" -f db/fixes/2026-06-29_payment_safety.sql
          done

      - name: SQL integration tests
        run: |
          set -euo pipefail
          PSQL=(psql "$TEST_DATABASE_URL" -X -q -v ON_ERROR_STOP=1)

          "${PSQL[@]}" -f db/tests/2026-06-29_invoice_tax_test.sql
          "${PSQL[@]}" -f db/tests/2026-06-29_payment_safety_test.sql

      - name: Concurrency test
        run: bash db/tests/concurrency/payment_race.sh

      - name: Assert grants signatures and schema
        run: psql "$TEST_DATABASE_URL" -X -q -v ON_ERROR_STOP=1 -f db/tests/2026-06-29_assert_grants.sql
